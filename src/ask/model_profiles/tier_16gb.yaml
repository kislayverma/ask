# Model selections for Macs with 16GB unified memory.
# Sweet spot: specialist 7-8B models with comfortable headroom.

classifier:
  model: mlx-community/Phi-3.5-mini-instruct-4bit
  type: mlx_lm
  description: "Phi-3.5-mini 3.8B (4-bit) -- fast classifier, ~1.8GB"

roles:
  general:
    model: mlx-community/Qwen3-8B-4bit
    type: mlx_lm
    description: "Qwen3 8B (4-bit) -- best all-rounder, ~4.7GB"

  code:
    model: mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
    type: mlx_lm
    description: "Qwen2.5-Coder 7B (4-bit) -- 88% HumanEval, ~4.4GB"

  vision:
    model: mlx-community/Qwen2.5-VL-7B-Instruct-4bit
    type: mlx_vlm
    description: "Qwen2.5-VL 7B (4-bit) -- image understanding, ~5.9GB"

  audio:
    model: Qwen/Qwen3-ASR-0.6B
    type: mlx_qwen3_asr
    description: "Qwen3-ASR 0.6B -- real-time speech-to-text, ~0.6GB"
